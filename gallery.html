<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery | Fayazur Rahman Summit</title>
    <meta name="description" content="Full image gallery showcasing projects and interests of Fayazur Rahman Summit." />
    <meta name="author" content="Fayazur Rahman Summit" />
    <style>
        :root {
            --ink: #17201d;
            --muted: #5d6a64;
            --paper: #ffffff;
            --wash: #f4f7f6;
            --soft: #e7eeea;
            --line: #d6e0da;
            --accent: #007f73;
            --accent-dark: #045c55;
            --shadow: 0 18px 50px rgba(23, 32, 29, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: var(--wash);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        img {
            display: block;
            max-width: 100%;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        a:focus-visible,
        button:focus-visible {
            outline: 3px solid rgba(0, 127, 115, 0.35);
            outline-offset: 3px;
        }

        /* Header */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid rgba(214, 224, 218, 0.85);
            background: rgba(244, 247, 246, 0.92);
            backdrop-filter: blur(16px);
        }

        .nav {
            width: min(1120px, calc(100% - 32px));
            min-height: 72px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--ink);
            color: var(--paper);
            font-weight: 900;
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 700;
            padding: 8px 10px;
            border-radius: 6px;
            transition: color 120ms ease;
        }

        .nav-links a:hover {
            color: var(--ink);
        }

        /* Container */
        .container {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--line);
        }

        .page-header h1 {
            font-size: 2.2rem;
            margin: 0 0 8px;
            font-weight: 900;
        }

        .page-header p {
            color: var(--muted);
            margin: 0;
        }

        /* Controls */
        .gallery-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
        }

        .gallery-controls .image-count {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 700;
        }

        .view-toggles {
            display: flex;
            gap: 6px;
        }

        .view-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--line);
            background: var(--paper);
            color: var(--muted);
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 160ms ease;
        }

        .view-toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent-dark);
        }

        .view-toggle-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--paper);
        }

        .view-toggle-btn.active:hover {
            background: var(--accent-dark);
        }

        /* Gallery Section */
        .gallery-section {
            padding: 32px 0 16px;
            border-bottom: 1px solid var(--line);
        }

        .gallery-section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 900;
            margin: 0 0 4px;
        }

        .section-source {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 16px;
        }

        /* Grid View */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .image-grid.list-view {
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .image-grid.list-view .grid-image-item {
            aspect-ratio: auto;
            max-height: 600px;
        }

        .grid-image-item {
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--paper);
            cursor: pointer;
            position: relative;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .grid-image-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(23, 32, 29, 0.1);
            border-color: var(--accent);
        }

        .grid-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 300ms ease;
        }

        .grid-image-item:hover img {
            transform: scale(1.03);
        }

        /* Image overlay index */
        .image-index {
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: rgba(23, 32, 29, 0.72);
            color: var(--paper);
            font-size: 0.72rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Lightbox */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(23, 32, 29, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 250ms ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-img-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            transform: scale(0.95);
            transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lightbox-overlay.active .lightbox-img-wrapper {
            transform: scale(1);
        }

        .lightbox-img {
            display: block;
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        .lightbox-close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            background: none;
            border: none;
            color: var(--paper);
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 160ms ease;
        }

        .lightbox-close-btn:hover {
            opacity: 1;
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--line);
            background: var(--ink);
            color: rgba(255, 255, 255, 0.66);
            padding: 24px 0;
            margin-top: 48px;
        }

        .footer .container {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.92rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: var(--muted);
        }

        .empty-state svg {
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            font-weight: 800;
            font-size: 0.92rem;
            transition: color 160ms ease;
        }

        .back-link:hover {
            color: var(--accent-dark);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .nav {
                align-items: flex-start;
                flex-direction: column;
                min-height: auto;
                padding: 16px 0;
            }

            .image-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .page-header h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 640px) {
            body {
                font-size: 15px;
            }

            .container,
            .nav {
                width: min(366px, calc(100vw - 24px));
                max-width: calc(100vw - 24px);
                margin-left: 12px;
                margin-right: auto;
            }

            .image-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .image-grid.list-view {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <nav class="nav" aria-label="Gallery navigation">
            <a class="brand" href="index.html">
                <span class="brand-mark" aria-hidden="true">FS</span>
                <span>
                    <strong>Fayazur Rahman Summit</strong><br>
                    <span style="font-weight: 500; font-size: 0.82rem; color: var(--muted);">Gallery</span>
                </span>
            </a>
            <div class="nav-links">
                <a href="index.html#projects">Projects</a>
                <a href="index.html#interests">Interests</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="page-header">
                <a class="back-link" href="index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back to Portfolio
                </a>
                <h1>Image Gallery</h1>
                <p>All project screenshots and interest photos in one place.</p>
            </div>

            <div class="gallery-controls">
                <span class="image-count" id="total-count"></span>
                <div class="view-toggles">
                    <button class="view-toggle-btn active" id="btn-grid" aria-label="Grid View">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Grid
                    </button>
                    <button class="view-toggle-btn" id="btn-list" aria-label="List View">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                        List
                    </button>
                </div>
            </div>

            <div id="gallery-content"></div>
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox-overlay" aria-hidden="true">
        <div class="lightbox-img-wrapper">
            <button id="lightbox-close" class="lightbox-close-btn" aria-label="Close">&times;</button>
            <img id="lightbox-img" class="lightbox-img" src="" alt="Maximized view" />
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <span>&copy; 2026 Fayazur Rahman Summit</span>
            <span>Senior Software Engineer &mdash; Team Lead &mdash; IDARE Limited</span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ── Google Drive link converter ──
            const getDirectDriveUrl = (url) => {
                if (url.includes('drive.google.com')) {
                    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                        return `https://lh3.googleusercontent.com/d/${match[1]}`;
                    }
                }
                return url;
            };

            // ── Gallery Data (same as index.html — update both when adding links) ──
            const projectGalleries = {
                "Knowverse AI": [
                    "https://drive.google.com/file/d/1O9OEE30OSnKPPUSU-agyAc8BisQobF6X/view?usp=sharing",
                    "https://drive.google.com/file/d/11r89CITiPEhZEWnZG_X2AS5-t0NnoOix/view?usp=sharing",
                    "https://drive.google.com/file/d/18vuZUD2-MUOKBaMq2UGQ55drHEp0ijOK/view?usp=sharing",
                    "https://drive.google.com/file/d/1I5zWJ_Ojcf7d28KHu_devTA4q5AMQ0M8/view?usp=sharing",
                    "https://drive.google.com/file/d/1NBEtfq_7nsfoTbYhT3HNyUhzmS483nKQ/view?usp=sharing",
                    "https://drive.google.com/file/d/1X1JpGz7LBOqUYtSRmZkfWenPdpSuWlws/view?usp=sharing",
                    "https://drive.google.com/file/d/1a0IiltgVQDFpPGVJG-U6yxTpsr84DFQy/view?usp=sharing",
                    "https://drive.google.com/file/d/1a8YGBKhDrM8q9GV91azDncj5g2WALJFf/view?usp=sharing",
                    "https://drive.google.com/file/d/1nTK3uMlAbdNNlcg_Nv3TnrSG2E2h_PDK/view?usp=sharing",
                    "https://drive.google.com/file/d/1yVjJZZiDG3COHswTLKuWiEO5DICpbObA/view?usp=sharing",
                    "https://drive.google.com/file/d/1ys0jHZXDIo7jyaHmUDoagU9eYMZhgQGH/view?usp=sharing"
                ],
                "IDARE Dashboard Analytics": [
                    "https://drive.google.com/file/d/100LU12rWCD6J2_UFmQnFxUyYfCIYkSOi/view?usp=sharing",
                    "https://drive.google.com/file/d/1JfotDNgVic3wBOw3kndhCBZQHGmFtuxN/view?usp=sharing",
                    "https://drive.google.com/file/d/1NFrYPEgxO0ghtbtJRJwqw4sltcGBlcSH/view?usp=sharing",
                    "https://drive.google.com/file/d/1PHy8OgRNCdFubuYSgZfAD8ix5jQh-W3l/view?usp=sharing",
                    "https://drive.google.com/file/d/1_SqXPf-Br5r6YerTjwaK792pYWBUQDdT/view?usp=sharing",
                    "https://drive.google.com/file/d/1x79ndWi6X71UMf0sy2mMZS6xAaO-Q8RI/view?usp=sharing",
                    "https://drive.google.com/file/d/1y9v-2t5AdWOoIoHajZUCoUC2DguvuNN9/view?usp=sharing"
                ],
                "Digital Twin Digital Platform": [
                    "https://drive.google.com/file/d/13SOwLuIKN-aWYt-qC_aB0-HbgI5mOzPT/view?usp=sharing",
                    "https://drive.google.com/file/d/1Jfp7tYKBfvRJijNpBnR6lCWcvNFuOKCI/view?usp=sharing",
                    "https://drive.google.com/file/d/1jQXdv6L3LlY5BfhavRKEOeCjt3x_LT_q/view?usp=sharing",
                    "https://drive.google.com/file/d/1wX9qdhCoOd3a3Qhn95wvVNHZ_63cfGyg/view?usp=sharing"
                ]
            };

            const interestGalleries = {
                // Add your Google Drive links for each interest:
                // "Bike Touring & Exploration": [],
                // "YouTube Content Creation": [],
                // "Video Editing": [],
                // "Cartoon Illustration": [],
                // "Blogging": []
            };

            // ── Lightbox ──
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxClose = document.getElementById('lightbox-close');

            const openLightbox = (src, alt) => {
                if (lightbox && lightboxImg) {
                    lightboxImg.src = src;
                    lightboxImg.alt = alt || 'Maximized image';
                    lightbox.classList.add('active');
                    lightbox.setAttribute('aria-hidden', 'false');
                }
            };

            const closeLightbox = () => {
                if (lightbox) {
                    lightbox.classList.remove('active');
                    lightbox.setAttribute('aria-hidden', 'true');
                }
            };

            if (lightbox) {
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox || e.target === lightboxClose || e.target.classList.contains('lightbox-img-wrapper')) {
                        closeLightbox();
                    }
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeLightbox();
            });

            // ── Slug helper ──
            const toSlug = (str) => str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            // ── Render Gallery ──
            const contentEl = document.getElementById('gallery-content');
            const countEl = document.getElementById('total-count');
            let totalImages = 0;

            const renderSection = (title, images, type) => {
                if (!images || images.length === 0) return;

                const slug = toSlug(title);
                totalImages += images.length;

                const section = document.createElement('div');
                section.className = 'gallery-section';
                section.id = `gallery-${slug}`;

                const h2 = document.createElement('h2');
                h2.className = 'section-title';
                h2.textContent = title;

                const badge = document.createElement('span');
                badge.className = 'section-source';
                badge.textContent = `${type} · ${images.length} image${images.length > 1 ? 's' : ''}`;

                const grid = document.createElement('div');
                grid.className = 'image-grid gallery-grid-instance';

                images.forEach((imgUrl, idx) => {
                    const directUrl = getDirectDriveUrl(imgUrl);
                    const item = document.createElement('div');
                    item.className = 'grid-image-item';
                    item.innerHTML = `
                        <img src="${directUrl}" alt="${title} ${idx + 1}" loading="lazy" />
                        <span class="image-index">${idx + 1} / ${images.length}</span>
                    `;
                    item.addEventListener('click', () => openLightbox(directUrl, `${title} — Image ${idx + 1}`));
                    grid.appendChild(item);
                });

                section.appendChild(h2);
                section.appendChild(badge);
                section.appendChild(grid);
                contentEl.appendChild(section);
            };

            // Render project galleries
            for (const [title, images] of Object.entries(projectGalleries)) {
                renderSection(title, images, 'Project');
            }

            // Render interest galleries
            for (const [title, images] of Object.entries(interestGalleries)) {
                renderSection(title, images, 'Interest');
            }

            // Update total count
            if (countEl) {
                countEl.textContent = `${totalImages} image${totalImages !== 1 ? 's' : ''} total`;
            }

            // Show empty state if no images
            if (totalImages === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.innerHTML = `
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <p><strong>No images yet.</strong></p>
                    <p>Add image links to the gallery config in gallery.html and index.html to see them here.</p>
                `;
                contentEl.appendChild(empty);
            }

            // ── Grid / List Toggle ──
            const btnGrid = document.getElementById('btn-grid');
            const btnList = document.getElementById('btn-list');
            const allGrids = () => document.querySelectorAll('.gallery-grid-instance');

            if (btnGrid && btnList) {
                btnGrid.addEventListener('click', () => {
                    allGrids().forEach(g => g.classList.remove('list-view'));
                    btnGrid.classList.add('active');
                    btnList.classList.remove('active');
                });

                btnList.addEventListener('click', () => {
                    allGrids().forEach(g => g.classList.add('list-view'));
                    btnList.classList.add('active');
                    btnGrid.classList.remove('active');
                });
            }

            // ── Auto-scroll to category from URL ──
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            if (category) {
                const targetEl = document.getElementById(`gallery-${category}`);
                if (targetEl) {
                    setTimeout(() => {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // Highlight effect
                        targetEl.style.transition = 'background 400ms ease';
                        targetEl.style.background = 'rgba(0, 127, 115, 0.06)';
                        setTimeout(() => targetEl.style.background = '', 2000);
                    }, 300);
                }
            }
        });
    </script>
</body>

</html>
